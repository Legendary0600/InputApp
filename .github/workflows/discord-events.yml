name: Discord All GitHub Events

on:
  push:
  pull_request:
  pull_request_review:
  issues:
  issue_comment:
  release:
  create:
  delete:
  fork:
  watch:
  workflow_run:
  discussion:
  discussion_comment:

jobs:
  discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send event notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_EVENTS }}
        run: |
          curl \
          -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "embeds": [
              {
                "title": "📢 GitHub Event",
                "description": "Event: **${{ github.event_name }}**\nRepository: **${{ github.repository }}**",
                "fields": [
                  {
                    "name": "User",
                    "value": "${{ github.actor }}",
                    "inline": true
                  },
                  {
                    "name": "Action",
                    "value": "${{ github.event.action }}",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "HorizonMods Input App"
                }
              }
            ]
          }' \
          "$DISCORD_WEBHOOK"
