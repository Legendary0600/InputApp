<!DOCTYPE html>
<html>
<head>
    <title>HorizonMods ControlInput</title>

    <link rel="stylesheet" href="static/styles/cstyle.css">
    <link rel="stylesheet" href="static/styles/style.css">
    <link rel="stylesheet" href="static/styles/module/presentselect.css">

    
    <link rel="stylesheet" href="static/styles/module/context.css">
    <script src="frontend/modules/context.js"></script>
    
    <link rel="stylesheet" href="static/styles/module/formelement.css">
    <script src="frontend/modules/formelement.js"></script>
    
    <link rel="stylesheet" href="static/styles/module/notifications.css">
    <script src="frontend/modules/notifications.js"></script>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll(".ext-link").forEach(elm => elm.addEventListener("click", (e) => {
                e.preventDefault();
                window.CoreAPI.openExternal(elm.dataset.url);
            }));
        });
    </script>

</head>
<body data-tmenu="false">
    <script>
        window.addEventListener("keyup", (e) => {
            if (e.key === "F5") {
                e.preventDefault();
                location.reload();
            };
        });
    </script>

    <header class="color6">
        <a class="branding d03 x8752 x8956 ext-link" data-url="https://discord.gg/7nUv55Xfg8">
            <img class="cimg" src="static/Core.png" alt="" />
            <div>
                <strong>HorizonMods</strong>
                <small>The sky is yours</small>
            </div>
        </a>

        <div class="d03 x8752 gap-4">
            <button class="add-device">Select Device</button>
            <select id="slang">
                <option value="en-US" selected>English</option>
                <option value="de-DE">Deutsch</option>
            </select>

            <svg xmlns="http://www.w3.org/2000/svg" id="stadia" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor">
                <path d="M189-160q-60 0-102.5-43T42-307q0-9 1-18t3-18l84-336q14-54 57-87.5t98-33.5h390q55 0 98 33.5t57 87.5l84 336q2 9 3.5 18.5T919-306q0 61-43.5 103.5T771-160q-42 0-78-22t-54-60l-28-58q-5-10-15-15t-21-5H385q-11 0-21 5t-15 15l-28 58q-18 38-54 60t-78 22Zm3-80q19 0 34.5-10t23.5-27l28-57q15-31 44-48.5t63-17.5h190q34 0 63 18t45 48l28 57q8 17 23.5 27t34.5 10q28 0 48-18.5t21-46.5q0 1-2-19l-84-335q-7-27-28-44t-49-17H285q-28 0-49.5 17T208-659l-84 335q-2 6-2 18 0 28 20.5 47t49.5 19Zm376.5-291.5Q580-543 580-560t-11.5-28.5Q557-600 540-600t-28.5 11.5Q500-577 500-560t11.5 28.5Q523-520 540-520t28.5-11.5Zm80-80Q660-623 660-640t-11.5-28.5Q637-680 620-680t-28.5 11.5Q580-657 580-640t11.5 28.5Q603-600 620-600t28.5-11.5Zm0 160Q660-463 660-480t-11.5-28.5Q637-520 620-520t-28.5 11.5Q580-497 580-480t11.5 28.5Q603-440 620-440t28.5-11.5Zm80-80Q740-543 740-560t-11.5-28.5Q717-600 700-600t-28.5 11.5Q660-577 660-560t11.5 28.5Q683-520 700-520t28.5-11.5Zm-367 63Q370-477 370-490v-40h40q13 0 21.5-8.5T440-560q0-13-8.5-21.5T410-590h-40v-40q0-13-8.5-21.5T340-660q-13 0-21.5 8.5T310-630v40h-40q-13 0-21.5 8.5T240-560q0 13 8.5 21.5T270-530h40v40q0 13 8.5 21.5T340-460q13 0 21.5-8.5ZM480-480Z"/>
            </svg>
        </div>
    </header>

    <div class="content">
        <div class="device-select">
            <div class="wrapper">
                <div class="loading"><div class="bar"></div></div>
                <div class="inner"></div>
                <button>Cancel</button>
            </div>
        </div>

        <div class="InputManager">
            <div class="devices">
                <div class="list IDL"></div>
            </div>
            <details class="preset-selector p100w x8750">
                <summary>No Present Selected</summary>
                <div class="dropdown">
                    <div class="new-preset x8752 d03">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor">
                            <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/>
                        </svg>
                        Neues Preset
                    </div>
                    <div class="preset-list"></div>
                </div>
            </details>
            <div class="inputmapps">
                <label>Input Mappings</label>
            </div>
        </div>
    </div>

    <script src="frontend/main.js" type="module"></script>

    <div id="inputNameBox" style="display:none;">
        <p>Wie soll dieser Input heißen?</p>
        <input id="inputNameField" placeholder="z.B. Gas" />
        <button id="inputConfirm">OK</button>
    </div>
</body>
</html>
